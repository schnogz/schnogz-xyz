enableScripts: true

# Yarn 4 flags React 18 peer-dep ranges on Gatsby's internal transitives
# (reach-router, react-server-dom-webpack) as incompatible with our React 19.
# React 19 works fine across build, deploy, and runtime — the warning is
# cosmetic. Silence specifically these two warning codes; other peer-dep
# issues will still surface.
logFilters:
  - code: YN0060
    level: discard
  - code: YN0086
    level: discard

nodeLinker: node-modules

yarnPath: .yarn/releases/yarn-4.17.0.cjs
